name: Set Simulation Sleep

on:
  # 手动触发，可自定义小时数
  workflow_dispatch:
    inputs:
      hours:
        description: '距现在多少小时后设置 sleep_at'
        required: false
        default: '71'
        type: string

  # 每 6 小时检查并更新 sleep_at
  schedule:
    - cron: '0 */6 * * *'

jobs:
  set-sleep:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set sleep_at on simulation
        id: update
        env:
          NVIDIA_AIR_API_KEY: ${{ secrets.NVIDIA_AIR_API_KEY }}
          SIMULATION_ID: ${{ secrets.SIMULATION_ID }}
          NVIDIA_AIR_API_BASE: ${{ vars.NVIDIA_AIR_API_BASE || 'https://api.air-ngc.nvidia.com/api/v3' }}
          VERBOSE: ${{ vars.VERBOSE }}
        run: |
          chmod +x ./set-sleep.sh
          ./set-sleep.sh "${{ inputs.hours || '71' }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Failed to update sleep_at for simulation ${{ secrets.SIMULATION_ID }}"
